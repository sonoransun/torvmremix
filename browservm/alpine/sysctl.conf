# Browser VM kernel hardening.

# ASLR: full randomization.
kernel.randomize_va_space = 2

# Restrict kernel pointers and dmesg.
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

# Restrict ptrace to root only.
kernel.yama.ptrace_scope = 2

# No core dumps for setuid programs.
fs.suid_dumpable = 0

# Protect symlinks and hardlinks.
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Disable unprivileged user namespaces (reduces sandbox escape surface).
kernel.unprivileged_userns_clone = 0

# Restrict perf_event access.
kernel.perf_event_paranoid = 3

# Disable unprivileged BPF.
kernel.unprivileged_bpf_disabled = 1

# Harden BPF JIT.
net.core.bpf_jit_harden = 2

# SYN flood protection.
net.ipv4.tcp_syncookies = 1

# Disable IP forwarding (browser VM doesn't route).
net.ipv4.ip_forward = 0

# Disable ICMP redirects.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reverse path filtering.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP broadcast echo.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Disable IPv6 entirely.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1

# Entropy thresholds.
kernel.random.read_wakeup_threshold = 256
kernel.random.write_wakeup_threshold = 896
